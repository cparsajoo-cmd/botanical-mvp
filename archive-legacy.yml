name: Archive legacy files (Phase 7)

# Manually triggered only — go to the Actions tab (in the GitHub app or
# on github.com), select "Archive legacy files (Phase 7)", tap "Run
# workflow". No terminal or local Python needed.
#
# CRITICAL FIX (this revision): a real bug was found where
# .github/legacy-files.txt listed question_understanding_engine.py as
# safe to archive while step_inputs.py was actively importing
# standardize_project_definition from it — the static list had gone
# stale after a later session wired that file into production, and
# nothing re-validated it before this workflow could have run. This
# workflow now VALIDATES the legacy list against the real, freshly
# recomputed dependency graph immediately before touching any file, and
# refuses to move anything if the list is unsafe. See
# repo_dependency_audit.py for the validation logic and
# test_production_dependency_integrity.py for the same check as a
# regular pytest test (so it also runs on every normal CI run, not only
# when this workflow is triggered).
#
# What this does, in order:
#   1. Validates .github/legacy-files.txt against a FRESH dependency
#      graph computed from app.py + pages/* right now — fails the job
#      immediately, before touching any file, if anything listed is
#      actually reachable from production.
#   2. Creates archive/ if it doesn't exist.
#   3. `git mv`s each of the 66 confirmed-legacy files (see
#      .github/legacy-files.txt; two additional files —
#      data_contracts.py and scoring_sensitivity_report.py /
#      repo_dependency_audit.py — are intentionally standalone tools,
#      not legacy, and are deliberately NOT in this list) into
#      archive/, preserving their git history (mv, not delete+recreate).
#   4. Runs the production dependency smoke test — confirms the move
#      didn't remove anything a Step file (or anything it transitively
#      imports) actually needed.
#   5. Runs the full test suite — if anything fails, the workflow stops
#      WITHOUT committing, so a bad move never reaches main.
#   6. Writes archive/ARCHIVED_FILES.md documenting what was moved and
#      when, and commits everything in one commit.
#
# Safe to re-run: files already in archive/ are skipped, not errored on.
on:
  workflow_dispatch: {}

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate legacy list against current production dependency graph (pre-move)
        run: |
          python3 repo_dependency_audit.py validate . .github/legacy-files.txt

      - name: Move legacy files into archive/
        run: |
          mkdir -p archive
          moved=""
          skipped=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ -f "$f" ]; then
              git mv "$f" "archive/$f"
              moved="$moved- $f\n"
            else
              skipped="$skipped- $f (not found — already moved or removed)\n"
            fi
          done < .github/legacy-files.txt
          echo "MOVED<<EOF" >> "$GITHUB_ENV"
          echo -e "$moved" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          echo "SKIPPED<<EOF" >> "$GITHUB_ENV"
          echo -e "$skipped" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Run production dependency smoke test (post-move)
        run: pytest -q test_production_dependency_integrity.py

      - name: Run full test suite (safety check before committing)
        run: pytest -q

      - name: Write archive manifest
        run: |
          {
            echo "# Archived files (Phase 7)"
            echo ""
            echo "Moved on $(date -u +%Y-%m-%dT%H:%M:%SZ) by the"
            echo "\`archive-legacy.yml\` workflow. Each file below was"
            echo "confirmed, by automated import-reachability analysis"
            echo "from \`app.py\` (see \`ARCHITECTURE.md\` and"
            echo "\`repo_dependency_audit.py\`), to have zero active"
            echo "imports pointing to it at the time it was moved — and"
            echo "re-confirmed immediately before this run (see the"
            echo "'Validate legacy list' step above), not trusted from a"
            echo "possibly-stale prior computation."
            echo ""
            echo "Moved this run:"
            echo -e "$MOVED"
          } > archive/ARCHIVED_FILES.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Phase 7: archive legacy files (automated, workflow_dispatch)" || echo "Nothing to commit"
          git push
